<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-main { fill: #FFFFFF; font-family: sans-serif; font-weight: bold; font-size: 28px; text-transform: uppercase; }
      .text-sub { fill: #FFA500; font-family: sans-serif; font-weight: bold; font-size: 24px; text-transform: uppercase; }
      .icon-accent { fill: #FFA500; }
      .icon-neutral { fill: #888888; }
    </style>
  </defs>

  <g transform="translate(150, 40)">
    <rect x="10" y="50" width="30" height="15" rx="2" class="icon-neutral" />
    <rect x="45" y="50" width="30" height="15" rx="2" class="icon-neutral" />
    <rect x="27" y="32" width="30" height="15" rx="2" class="icon-neutral" />
    
    <path d="M5,25 L45,-15 L85,25" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <rect x="35" y="-5" width="15" height="15" transform="rotate(45 42.5 2.5)" fill="#666" stroke="#FFF" stroke-width="1"/>
    
    <path d="M55,10 L40,35 L55,35 L40,65" fill="none" stroke="#FFA500" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <text x="200" y="180" text-anchor="middle" class="text-main">Maçonnerie &amp; Carreleur</text>
  <text x="200" y="215" text-anchor="middle" class="text-sub">ÉLECTRICITÉ</text>
  
  <line x1="100" y1="235" x2="300" y2="235" stroke="#444" stroke-width="2" />
  
  <text x="200" y="260" text-anchor="middle" fill="#AAA" font-family="sans-serif" font-size="12" letter-spacing="2">QUALITÉ • EXPERTISE • INNOVATION</text>
</svg>
